<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Sign Up</title>
    <link rel="stylesheet" href="/CSS/signup.css">
</head>
<body>
    <header>
        <h1>TaskFlow Pro</h1>
        <h2>create an account</h2>
    </header>
    <main>
        <form id="signupForm">
            <label for="fullName">Fullname:</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter Your Fullname">
            <p id="fullNameError"></p><br><br>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter Your Email"><br><br>
            <p id="emailError"></p>
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter Your Password"><br><br>
            <p id="passwordError"></p>
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Your Password"><br><br>
            <p id="confirmPasswordError"></p>
            <button type="submit">Create Account</button>
        </form>
    </main>
    <footer></footer>
    

    <script src="/JavaScript/signup.js"></script>
</body>
</html>
